<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; background:transparent; overflow:hidden; }
  .wrap { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
  img {
    width:160px; height:160px; object-fit:contain;
    filter: drop-shadow(0 10px 34px rgba(99,102,241,.5));
    animation: pop .5s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes pop { from { opacity:0; transform:scale(.4); } to { opacity:1; transform:scale(1); } }
  .wrap.leaving img { animation: grow .32s ease forwards; }
  @keyframes grow { from { opacity:1; transform:scale(1); } to { opacity:0; transform:scale(2.6); } }
</style>
</head>
<body>
  <div class="wrap" id="wrap"><img src="../assets/icon.png"></div>
  <script>
    const { ipcRenderer } = require('electron');
    ipcRenderer.on('leave', () => { document.getElementById('wrap').classList.add('leaving'); });
  </script>
</body>
</html>
