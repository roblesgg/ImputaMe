<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="shared.css">
<style>
  html, body { width:100%;height:100%; }
  body { border-radius:var(--radius);overflow:hidden; }

  .cal-app { width:100%;height:100%;display:flex;flex-direction:column;position:relative;-webkit-app-region:no-drag; }

  /* Barra de título arrastrable: permite mover la ventana desde CUALQUIER punto
     de esta franja superior, no solo desde el texto. Lo marcamos explícitamente
     (y también la fila de navegación de semana) para que toda la parte superior
     de la ventana sirva para arrastrar. */
  .cal-titlebar {
    flex-shrink:0;height:54px;display:flex;align-items:center;gap:10px;
    padding:0 16px;border-bottom:1px solid var(--border);
  }
  /* El contenedor es no-drag; el arrastre va SOLO en el título (izquierda) y en la fila
     de semana, para que la X (arriba a la derecha) se pulse entera. Una zona drag detrás
     del botón no-drag se come parte del clic. */
  .cal-titlebar-title { font-size:14px;font-weight:700;-webkit-app-region:drag; }
  .week-nav { -webkit-app-region:drag; }
  .week-nav .week-nav-btn { -webkit-app-region:no-drag; }
  .cal-titlebar-title .brand-dot { color:var(--accent); }

  .cal-body { flex:1;display:flex;min-height:0;position:relative; }

  /* Sidebar */
  .sidebar {
    width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:16px;
    padding:16px;border-right:1px solid var(--border);overflow-y:auto;
  }


  .mini-cal-nav { display:flex;align-items:center;justify-content:space-between;margin-bottom:6px; }
  .mini-cal-title { font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em; }
  .mini-cal-arrows { display:flex;gap:2px; }
  .mini-nav-btn { background:transparent;border:none;color:var(--text2);width:22px;height:22px;border-radius:6px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center; }
  .mini-nav-btn:hover { background:var(--bg3);color:var(--text); }

  .mini-cal-grid { display:grid;grid-template-columns:repeat(7,1fr);gap:2px; }
  .mini-dow { text-align:center;font-size:11px;color:var(--text2);padding:2px 0; }
  .mini-day {
    aspect-ratio:1;display:flex;align-items:center;justify-content:center;
    border-radius:6px;cursor:pointer;font-size:12.5px;color:var(--text);position:relative;
    -webkit-app-region:no-drag;
  }
  .mini-day:hover { background:var(--bg3); }
  .mini-day.other-month { color:var(--text2);opacity:.35; }
  .mini-day.in-week { background:rgba(99,102,241,.16); }
  .mini-day.today { color:var(--accent);font-weight:700; }
  .mini-day.selected { background:var(--accent2);color:#fff;font-weight:700; }
  .mini-day .dot { position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--accent); }

  .today-btn {
    background:var(--bg2);border:1px solid var(--border);color:var(--text);
    font-size:13px;padding:8px 0;border-radius:var(--radius-sm);cursor:pointer;
  }
  .today-btn:hover { background:var(--bg3); }

  .legend-title { font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px; }
  .legend-item { display:flex;align-items:center;gap:8px;padding:5px 2px;font-size:13.5px;cursor:pointer;border-radius:6px;-webkit-app-region:no-drag; }
  .legend-item:hover { background:var(--bg3); }
  .legend-item.hidden-task { opacity:.4; }
  .legend-dot { width:10px;height:10px;border-radius:50%;flex-shrink:0; }
  .legend-name { flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }

  .day-totals { display:flex;flex-direction:column;gap:2px; }
  .day-total-time { font-size:12px;color:var(--text2);font-variant-numeric:tabular-nums;flex-shrink:0; }

  .sidebar-footer { margin-top:auto; }
  .export-btn { width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-size:13px;padding:9px 0;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px; }
  .export-btn:hover { background:var(--bg3); }

  /* Main */
  .main { flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0; }

  .week-nav { display:flex;align-items:center;gap:10px;padding:14px 20px 8px; }
  .week-nav-btn { background:var(--bg2);border:1px solid var(--border);color:var(--text);width:28px;height:28px;border-radius:8px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center; }
  .week-nav-btn:hover { background:var(--bg3); }
  .week-label { font-size:16px;font-weight:600;text-transform:capitalize; }

  .week-header { display:flex;padding:0 20px;border-bottom:1px solid var(--border); }
  .gutter-spacer { width:48px;flex-shrink:0; }
  .day-header { flex:1;text-align:center;padding:8px 4px;font-size:12.5px;color:var(--text2);cursor:pointer;border-radius:8px 8px 0 0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;-webkit-app-region:no-drag; }
  .day-header .dh-num { font-size:18px;font-weight:700;color:var(--text);display:block; }
  .day-header.today .dh-num { color:var(--accent); }
  .day-header.today { background:rgba(99,102,241,.10); }

  .grid-scroll { flex:1;overflow-y:auto;overflow-x:hidden;padding:0 20px 16px;-webkit-app-region:no-drag; }
  .grid-body { display:flex;position:relative; }
  .hour-gutter { width:48px;flex-shrink:0;position:relative; }
  .hour-cell { height:48px;position:relative; }
  .hour-cell span { position:absolute;top:-7px;right:8px;font-size:11.5px;color:var(--text2); }

  /* Marca de la hora actual, solo en la franja de horas (no cruza los días) */
  .now-tick { position:absolute;left:6px;right:0;height:0;border-top:2px solid var(--danger);pointer-events:none; }

  .day-col {
    flex:1;position:relative;border-left:1px solid var(--border);
    background-image: repeating-linear-gradient(to bottom, transparent, transparent 47px, var(--border) 47px, var(--border) 48px);
    cursor:crosshair;-webkit-app-region:no-drag;
  }
  .day-col.today { background-color:rgba(99,102,241,.06); }

  .task-block {
    position:absolute;left:2px;right:2px;border-radius:6px;padding:8px 7px;
    font-size:12px;color:#fff;overflow:hidden;cursor:pointer;
    box-shadow:0 1px 3px rgba(0,0,0,.3);line-height:1.3;-webkit-app-region:no-drag;
    display:flex;flex-direction:column;justify-content:center;
  }
  .task-block .tb-name {
    font-weight:600;overflow:hidden;white-space:normal;overflow-wrap:anywhere;
  }
  .task-block .tb-time { display:flex;align-items:baseline;gap:6px;opacity:.85;font-size:11px; }
  .task-block .tb-time-range { overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0; }
  .task-block .tb-time-dur { flex-shrink:0;margin-left:auto;font-weight:700; }
  .task-block.ghost { opacity:.55;background:var(--accent2)!important;pointer-events:none; }
  .task-block.running { outline:1.5px solid var(--danger);outline-offset:1px; }

  /* Tiradores para redimensionar un bloque arrastrando su borde superior/inferior:
     una barrita flotante tipo "home indicator" de iPhone. Verde = entrada normal,
     roja = esta es la tarea que está corriendo ahora mismo.
     El hitbox se mantiene pequeño (ancho y alto) y pegado al borde para que,
     en tareas cortas, siga habiendo sitio para hacer click en el bloque en vez
     de agarrar sin querer el tirador; además evita que se solape con el
     tirador del bloque contiguo cuando dos tareas están pegadas, que era lo
     que hacía parpadear el hover. */
  .tb-handle {
    position:absolute;left:50%;transform:translateX(-50%);width:44px;height:12px;
    display:flex;align-items:center;justify-content:center;
    cursor:grab;opacity:0;transition:opacity .12s;z-index:6;
  }
  .tb-handle::after {
    content:'';box-sizing:border-box;width:38px;height:8px;border-radius:4px;
    background:var(--success);
    border:2px solid var(--handle-outline, rgba(0,0,0,.35));
    box-shadow:0 1px 4px rgba(0,0,0,.4);
  }
  .tb-handle-top { top:1px; }
  .tb-handle-bottom { bottom:1px; }
  .task-block:hover .tb-handle { opacity:1; }
  .tb-handle:active { cursor:grabbing; }
  .tb-handle.resizing { opacity:1;cursor:grabbing; }

  .tb-handle.running::after { background:var(--danger); animation:tbHandlePulse 1.6s ease-in-out infinite; }
  @keyframes tbHandlePulse {
    0%,100% { box-shadow:0 0 0 0 rgba(248,113,113,.5); }
    70% { box-shadow:0 0 0 6px rgba(248,113,113,0); }
  }

  .drag-time-label {
    position:absolute;left:50%;top:-26px;transform:translateX(-50%);
    background:rgba(20,20,32,.95);border:1px solid var(--accent);color:#fff;
    font-size:12.5px;font-weight:700;font-variant-numeric:tabular-nums;
    padding:3px 9px;border-radius:6px;white-space:nowrap;pointer-events:none;z-index:20;
    box-shadow:0 4px 12px rgba(0,0,0,.4);
  }

  /* Popup (estilos genéricos .popup-backdrop/.entry-popup en shared.css) */
  .popup-time-row { display:flex;align-items:center;gap:8px; }
  .popup-time-row input[type=time] {
    flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;
    color:var(--text);font-family:inherit;font-size:14px;padding:8px 9px;outline:none;color-scheme:dark;
  }

  /* Popup de exportación */
  .export-opts { display:flex;flex-direction:column;gap:2px; }
  .export-opt { display:flex;align-items:center;gap:9px;font-size:13.5px;padding:6px 4px;border-radius:6px;cursor:pointer;-webkit-app-region:no-drag; }
  .export-opt:hover { background:var(--bg2); }
  .export-opt input[type=radio] { width:15px;height:15px;accent-color:var(--accent2);cursor:pointer; }
  .export-hint { font-size:11.5px;color:var(--text2);min-height:14px; }
  #exportCustomRow input[type=date] {
    flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;
    color:var(--text);font-family:inherit;font-size:13px;padding:7px 9px;outline:none;color-scheme:dark;-webkit-app-region:no-drag;
  }
</style>
</head>
<body>
<div class="cal-app animate-in">

  <div class="win-controls">
    <button class="win-btn close" onclick="closeWin()" title="Cerrar">
      <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>

  <div class="cal-titlebar">
    <div class="cal-titlebar-title">Calendario · imputa<span class="brand-dot">.</span>me</div>
  </div>

  <div class="cal-body">
  <div class="sidebar">
    <div class="mini-cal">
      <div class="mini-cal-nav">
        <span class="mini-cal-title" id="miniCalTitle">—</span>
        <div class="mini-cal-arrows">
          <button class="mini-nav-btn" onclick="miniPrevMonth()">‹</button>
          <button class="mini-nav-btn" onclick="miniNextMonth()">›</button>
        </div>
      </div>
      <div class="mini-cal-grid" id="miniCalGrid"></div>
    </div>

    <button class="today-btn" onclick="goToday()">Hoy</button>

    <div class="task-legend">
      <div class="legend-title">Tareas</div>
      <div id="legendList"></div>
    </div>

    <div class="day-totals">
      <div class="legend-title" id="dayTotalsTitle">Tareas de hoy</div>
      <div id="dayTotalsList"></div>
    </div>

    <div class="sidebar-footer">
      <button class="export-btn" onclick="exportCSV()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4"/><path d="M4 21h16"/></svg>
        Exportar CSV
      </button>
    </div>
  </div>

  <div class="main">
    <div class="week-nav">
      <button class="week-nav-btn" onclick="prevWeek()">‹</button>
      <button class="week-nav-btn" onclick="nextWeek()">›</button>
      <span class="week-label" id="weekLabel">—</span>
    </div>

    <div class="week-header" id="weekHeader">
      <div class="gutter-spacer"></div>
    </div>

    <div class="grid-scroll" id="gridScroll">
      <div class="grid-body" id="gridBody">
        <div class="hour-gutter" id="hourGutter"></div>
      </div>
    </div>
  </div>
  </div>

  <div class="popup-backdrop" id="popupBackdrop" style="display:none" onclick="closePopup()"></div>
  <div class="entry-popup" id="entryPopup" style="display:none">
    <div class="entry-popup-title" id="popupTitle">Nueva entrada</div>

    <select id="popupTaskSelect" onchange="onPopupTaskChange()"></select>

    <div id="popupNewTaskFields" style="display:none;flex-direction:column;gap:8px">
      <input type="text" id="popupNewTaskName" placeholder="Nombre de la tarea..." maxlength="40">
      <div id="popupColorSection">
        <div class="color-row" id="popupColorPicker"></div>
      </div>
    </div>

    <div class="popup-time-row">
      <input type="time" id="popupStart">
      <span style="color:var(--text2);font-size:12px">→</span>
      <input type="time" id="popupEnd" placeholder="en curso">
    </div>

    <div class="entry-popup-actions">
      <button class="btn-danger" id="popupDeleteBtn" style="display:none" onclick="deletePopupEntry()">Eliminar</button>
      <div style="flex:1"></div>
      <button class="btn-ghost" onclick="closePopup()">Cancelar</button>
      <button class="btn-primary" onclick="savePopup()">Guardar</button>
    </div>
  </div>

  <!-- Popup de exportación: elige qué días exportar y luego dónde guardar -->
  <div class="popup-backdrop" id="exportPopupBackdrop" style="display:none" onclick="closeExportPopup()"></div>
  <div class="entry-popup" id="exportPopup" style="display:none">
    <div class="entry-popup-title">Exportar horas (CSV)</div>
    <div class="export-opts">
      <label class="export-opt"><input type="radio" name="exportRange" value="all" checked onchange="updateExportHint()"> Todos los días</label>
      <label class="export-opt"><input type="radio" name="exportRange" value="week" onchange="updateExportHint()"> Semana visible</label>
      <label class="export-opt"><input type="radio" name="exportRange" value="day" onchange="updateExportHint()"> Día seleccionado</label>
      <label class="export-opt"><input type="radio" name="exportRange" value="custom" onchange="updateExportHint()"> Rango personalizado</label>
    </div>
    <div id="exportCustomRow" class="popup-time-row" style="display:none">
      <input type="date" id="exportFrom" onchange="updateExportHint()">
      <span style="color:var(--text2);font-size:12px">→</span>
      <input type="date" id="exportTo" onchange="updateExportHint()">
    </div>
    <div class="export-hint" id="exportHint"></div>
    <div class="entry-popup-actions">
      <div style="flex:1"></div>
      <button class="btn-ghost" onclick="closeExportPopup()">Cancelar</button>
      <button class="btn-primary" id="exportConfirmBtn" onclick="confirmExport()">Exportar…</button>
    </div>
  </div>

</div>

<script src="shared.js"></script>
<script>
const { ipcRenderer, shell } = require('electron');

const ROW_H = 48;
const DOW = ['L','M','X','J','V','S','D'];
const DOW_LONG = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

let currentState = null;
let miniViewYear, miniViewMonth;
let viewWeekStart;
let selectedDate;
let hiddenTaskIds = new Set();
let popupMode = null;
let popupCtx = null;
let dragState = null;
let resizeState = null;
let hoveredBlocks = 0;
let popupColor = COLORS[0];

function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate()+n); return x; }
function mondayOf(d) { const x = startOfDay(d); const dow = (x.getDay()+6)%7; return addDays(x,-dow); }
function sameDay(a,b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function clamp(v,lo,hi) { return Math.max(lo, Math.min(hi, v)); }
function snapHour(h) { return Math.round(h*4)/4; }
function pad2(n) { return String(n).padStart(2,'0'); }
function hourToHHMM(h) { const hh = Math.floor(h); const mm = Math.round((h-hh)*60); return `${pad2(hh)}:${pad2(mm)}`; }
function hhmmToHour(str) { const [h,m] = (str||'0:0').split(':').map(Number); return h + m/60; }
function dateKey(d) { return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function formatDur(ms) {
  const totalMin = Math.max(0, Math.round(ms / 60000));
  const h = Math.floor(totalMin / 60), m = totalMin % 60;
  return h > 0 ? `${h}h ${String(m).padStart(2,'0')}m` : `${m}m`;
}
function timeRangeLabel(startMs, endMsOrNull) {
  const endLabel = endMsOrNull ? new Date(endMsOrNull).toTimeString().slice(0,5) : 'ahora';
  return `${new Date(startMs).toTimeString().slice(0,5)} - ${endLabel}`;
}

const today0 = startOfDay(new Date());

ipcRenderer.on('state', (_, state) => {
  currentState = state;
  let firstLoad = false;
  if (!viewWeekStart) {
    firstLoad = true;
    viewWeekStart = mondayOf(new Date());
    selectedDate = today0;
    miniViewYear = selectedDate.getFullYear();
    miniViewMonth = selectedDate.getMonth();
  }
  renderAll();
  if (firstLoad) scrollToNow();
});
ipcRenderer.send('action', { type: 'get-state' });

function renderAll() {
  renderMiniCal();
  renderLegend();
  renderDayTotals();
  renderWeek();
}

// ---------- Totales del día seleccionado ----------
function renderDayTotals() {
  const title = document.getElementById('dayTotalsTitle');
  const list = document.getElementById('dayTotalsList');
  if (!title || !list) return;
  const day = startOfDay(selectedDate || today0);
  title.textContent = sameDay(day, today0)
    ? 'Tareas de hoy'
    : `Tareas del ${day.getDate()} de ${MONTHS[day.getMonth()].toLowerCase()}`;

  list.innerHTML = '';
  if (!currentState) return;
  const dayStart = day.getTime();
  const dayEnd = dayStart + 86400000;

  const totals = [];
  currentState.tasks.forEach(task => {
    let secs = 0;
    task.entries.forEach(entry => {
      const s = entry.start, e = entry.end || Date.now();
      if (e <= dayStart || s >= dayEnd) return;
      const from = Math.max(s, dayStart), to = Math.min(e, dayEnd);
      secs += Math.max(0, (to - from) / 1000);
    });
    if (secs > 0) totals.push({ task, secs });
  });

  if (!totals.length) {
    list.innerHTML = '<div style="font-size:11px;color:var(--text2)">Sin actividad este día</div>';
    return;
  }
  totals.sort((a, b) => b.secs - a.secs);
  totals.forEach(({ task, secs }) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.style.cursor = 'default';
    item.innerHTML = `<div class="legend-dot" style="background:${task.color}"></div><span class="legend-name">${task.name}</span><span class="day-total-time">${formatDur(secs * 1000)}</span>`;
    list.appendChild(item);
  });
}

// ---------- Mini calendar ----------
function buildActivityDayKeys() {
  const set = new Set();
  if (!currentState) return set;
  for (const task of currentState.tasks) {
    for (const entry of task.entries) {
      let cur = startOfDay(new Date(entry.start));
      const end = startOfDay(new Date(entry.end || Date.now()));
      while (cur <= end) { set.add(dateKey(cur)); cur = addDays(cur,1); }
    }
  }
  return set;
}

function renderMiniCal() {
  document.getElementById('miniCalTitle').textContent = `${MONTHS[miniViewMonth]} ${miniViewYear}`;
  const grid = document.getElementById('miniCalGrid');
  grid.innerHTML = '';
  DOW.forEach(d => { const el = document.createElement('div'); el.className='mini-dow'; el.textContent=d; grid.appendChild(el); });

  const firstDay = new Date(miniViewYear, miniViewMonth, 1);
  let startDow = firstDay.getDay(); startDow = startDow===0?6:startDow-1;
  const totalDays = new Date(miniViewYear, miniViewMonth+1, 0).getDate();
  const dayMap = buildActivityDayKeys();
  const weekEnd = addDays(viewWeekStart, 7);

  const cells = [];
  for (let i=0;i<startDow;i++) cells.push({ date: new Date(miniViewYear,miniViewMonth,-startDow+i+1), other:true });
  for (let d=1;d<=totalDays;d++) cells.push({ date: new Date(miniViewYear,miniViewMonth,d), other:false });
  const remaining = 7-(cells.length%7);
  if (remaining<7) for (let i=1;i<=remaining;i++) cells.push({ date: new Date(miniViewYear,miniViewMonth+1,i), other:true });

  cells.forEach(({date,other}) => {
    const cell = document.createElement('div');
    const inWeek = date >= viewWeekStart && date < weekEnd;
    const isToday = sameDay(date, today0);
    const isSelected = selectedDate && sameDay(date, selectedDate);
    cell.className = 'mini-day' + (other?' other-month':'') + (inWeek?' in-week':'') + (isToday?' today':'') + (isSelected?' selected':'');
    cell.textContent = date.getDate();
    if (dayMap.has(dateKey(date))) {
      const dot = document.createElement('div'); dot.className='dot'; cell.appendChild(dot);
    }
    cell.onclick = () => {
      selectedDate = startOfDay(date);
      viewWeekStart = mondayOf(date);
      miniViewYear = date.getFullYear(); miniViewMonth = date.getMonth();
      renderAll();
    };
    grid.appendChild(cell);
  });
}

function miniPrevMonth() { miniViewMonth--; if (miniViewMonth<0){miniViewMonth=11;miniViewYear--;} renderMiniCal(); }
function miniNextMonth() { miniViewMonth++; if (miniViewMonth>11){miniViewMonth=0;miniViewYear++;} renderMiniCal(); }

function goToday() {
  selectedDate = startOfDay(new Date());
  viewWeekStart = mondayOf(new Date());
  miniViewYear = selectedDate.getFullYear(); miniViewMonth = selectedDate.getMonth();
  renderAll();
  scrollToNow();
}

// ---------- Legend ----------
function renderLegend() {
  const list = document.getElementById('legendList');
  list.innerHTML = '';
  if (!currentState || !currentState.tasks.length) {
    list.innerHTML = '<div style="font-size:11px;color:var(--text2)">Sin tareas todavía</div>';
    return;
  }
  currentState.tasks.forEach(t => {
    const item = document.createElement('div');
    item.className = 'legend-item' + (hiddenTaskIds.has(t.id)?' hidden-task':'');
    item.innerHTML = `<div class="legend-dot" style="background:${t.color}"></div><span class="legend-name">${t.name}</span>`;
    item.onclick = () => {
      if (hiddenTaskIds.has(t.id)) hiddenTaskIds.delete(t.id); else hiddenTaskIds.add(t.id);
      renderLegend(); renderWeek();
    };
    list.appendChild(item);
  });
}

// ---------- Week grid ----------
function renderWeek() {
  // No reconstruir la rejilla mientras se está arrastrando (destruiría el elemento en uso),
  // ni mientras el ratón está sobre una tarea: el estado llega cada segundo si hay una tarea
  // activa, y recrear el bloque bajo el cursor le reinicia el :hover y hace parpadear los tiradores.
  if (dragState || resizeState || hoveredBlocks > 0) return;
  const weekEndDay = addDays(viewWeekStart, 6);
  const sameMonth = viewWeekStart.getMonth() === weekEndDay.getMonth();
  const label = sameMonth
    ? `${viewWeekStart.getDate()} - ${weekEndDay.getDate()} de ${MONTHS[weekEndDay.getMonth()].toLowerCase()} ${weekEndDay.getFullYear()}`
    : `${viewWeekStart.getDate()} ${MONTHS[viewWeekStart.getMonth()].toLowerCase()} - ${weekEndDay.getDate()} ${MONTHS[weekEndDay.getMonth()].toLowerCase()} ${weekEndDay.getFullYear()}`;
  document.getElementById('weekLabel').textContent = label;

  const header = document.getElementById('weekHeader');
  header.innerHTML = '<div class="gutter-spacer"></div>';
  const days = [];
  for (let i=0;i<7;i++) days.push(addDays(viewWeekStart,i));
  days.forEach(date => {
    const el = document.createElement('div');
    const isToday = sameDay(date, today0);
    el.className = 'day-header' + (isToday?' today':'');
    el.innerHTML = `<span class="dh-num">${date.getDate()}</span>${DOW_LONG[(date.getDay()+6)%7]}`;
    el.onclick = () => { selectedDate = startOfDay(date); renderMiniCal(); renderDayTotals(); };
    header.appendChild(el);
  });

  const gutter = document.getElementById('hourGutter');
  gutter.innerHTML = '';
  for (let h=0; h<24; h++) {
    const cell = document.createElement('div'); cell.className='hour-cell';
    cell.innerHTML = `<span>${h}:00</span>`;
    gutter.appendChild(cell);
  }
  gutter.style.height = (24*ROW_H)+'px';
  renderNowTick(gutter);

  const gridBody = document.getElementById('gridBody');
  gridBody.querySelectorAll('.day-col').forEach(el => el.remove());
  gridBody.style.height = (24*ROW_H)+'px';

  days.forEach(date => {
    const col = document.createElement('div');
    col.className = 'day-col' + (sameDay(date, today0) ? ' today' : '');
    col.style.height = (24*ROW_H)+'px';
    col._date = date;
    attachDragHandlers(col);
    renderDayEntries(col, date);
    gridBody.appendChild(col);
  });
}

let suppressNextClick = false;

function renderDayEntries(col, date) {
  if (!currentState) return;
  const dayStart = startOfDay(date).getTime();
  const dayEnd = dayStart + 86400000;
  currentState.tasks.forEach(task => {
    if (hiddenTaskIds.has(task.id)) return;
    task.entries.forEach((entry, idx) => {
      const s = entry.start, e = entry.end || Date.now();
      if (e <= dayStart || s >= dayEnd) return;
      const from = Math.max(s, dayStart), to = Math.min(e, dayEnd);
      const startH = (from - dayStart) / 3600000;
      const endH = (to - dayStart) / 3600000;
      const block = document.createElement('div');
      block.className = 'task-block' + (entry.end == null ? ' running' : '');
      block.style.top = (startH*ROW_H)+'px';
      block.style.height = Math.max(16, (endH-startH)*ROW_H)+'px';
      block.style.background = task.color;
      block.style.color = contrastTextColor(task.color);
      block.title = task.name;
      const durMs = (entry.end || Date.now()) - entry.start;
      block.innerHTML = `<div class="tb-name">${task.name}</div><div class="tb-time"><span class="tb-time-range">${timeRangeLabel(entry.start, entry.end)}</span><span class="tb-time-dur">${formatDur(durMs)}</span></div>`;
      block.onclick = (ev) => {
        ev.stopPropagation();
        if (suppressNextClick) { suppressNextClick = false; return; }
        openEditPopup(task, idx, entry);
      };
      block.addEventListener('mouseenter', () => { hoveredBlocks++; });
      block.addEventListener('mouseleave', () => { hoveredBlocks = Math.max(0, hoveredBlocks - 1); });

      // El tirador superior ajusta la hora de inicio; solo tiene sentido si este
      // segmento realmente empieza aquí (no es la cola de una entrada de un día anterior).
      // Contorno del tirador a contraste con el color de la tarea: si la tarea es
      // roja/verde y el tirador también, se camuflaría contra el fondo del bloque.
      const handleOutline = contrastTextColor(task.color);
      if (from === s) {
        const topHandle = document.createElement('div');
        topHandle.className = 'tb-handle tb-handle-top' + (entry.end == null ? ' running' : '');
        topHandle.style.setProperty('--handle-outline', handleOutline);
        attachResizeHandle(topHandle, 'start', task, idx, entry, block, col);
        block.appendChild(topHandle);
      }
      // El tirador inferior ajusta la hora de fin; solo si la entrada ya tiene fin
      // (no está en curso) y este segmento contiene realmente ese fin.
      if (entry.end != null && to === e) {
        const bottomHandle = document.createElement('div');
        bottomHandle.className = 'tb-handle tb-handle-bottom';
        bottomHandle.style.setProperty('--handle-outline', handleOutline);
        attachResizeHandle(bottomHandle, 'end', task, idx, entry, block, col);
        block.appendChild(bottomHandle);
      }

      col.appendChild(block);
    });
  });
}

function attachResizeHandle(handleEl, edge, task, idx, entry, block, col) {
  handleEl.addEventListener('mousedown', (e) => {
    e.stopPropagation();
    e.preventDefault();
    suppressNextClick = true;
    const dayStart = startOfDay(col._date).getTime();
    const wasOngoing = entry.end == null;
    let newStart = entry.start;
    let newEnd = wasOngoing ? Date.now() : entry.end;
    handleEl.classList.add('resizing');
    resizeState = { edge };

    function onMove(ev) {
      const rect = col.getBoundingClientRect();
      const hour = snapHour(clamp((ev.clientY - rect.top) / ROW_H, 0, 24));
      const ms = dayStart + hour * 3600000;
      if (edge === 'start') newStart = Math.min(ms, newEnd - 5 * 60000);
      else newEnd = Math.max(ms, newStart + 5 * 60000);
      const startH = (newStart - dayStart) / 3600000;
      const endH = (newEnd - dayStart) / 3600000;
      block.style.top = (startH * ROW_H) + 'px';
      block.style.height = Math.max(16, (endH - startH) * ROW_H) + 'px';
      const rangeEl = block.querySelector('.tb-time-range');
      const durEl = block.querySelector('.tb-time-dur');
      const liveEndForLabel = wasOngoing && edge === 'start' ? null : newEnd;
      if (rangeEl) rangeEl.textContent = timeRangeLabel(newStart, liveEndForLabel);
      if (durEl) durEl.textContent = formatDur((liveEndForLabel || Date.now()) - newStart);
    }
    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      handleEl.classList.remove('resizing');
      resizeState = null;
      ipcRenderer.send('action', { type: 'edit-entry', payload: {
        taskId: task.id, entryIndex: idx,
        startMs: newStart,
        endMs: wasOngoing && edge === 'start' ? null : newEnd,
      }});
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function renderNowTick(gutter) {
  const weekEnd = addDays(viewWeekStart, 7);
  if (today0 < viewWeekStart || today0 >= weekEnd) return; // la semana visible no incluye hoy
  const now = new Date();
  const h = now.getHours() + now.getMinutes() / 60;
  const tick = document.createElement('div');
  tick.className = 'now-tick';
  tick.style.top = (h * ROW_H) + 'px';
  gutter.appendChild(tick);
}

function scrollToNow() {
  const el = document.getElementById('gridScroll');
  const h = new Date().getHours();
  el.scrollTop = Math.max(0, (h-2)*ROW_H);
}

// ---------- Drag to create ----------
function attachDragHandlers(col) {
  col.addEventListener('mousedown', (e) => {
    if (e.target.closest('.task-block')) return;
    const rect = col.getBoundingClientRect();
    const startHour = snapHour(clamp((e.clientY - rect.top) / ROW_H, 0, 24));
    const ghost = document.createElement('div');
    ghost.className = 'task-block ghost';
    ghost.style.top = (startHour*ROW_H)+'px';
    ghost.style.height = '4px';
    col.appendChild(ghost);
    const label = document.createElement('div');
    label.className = 'drag-time-label';
    label.style.top = (startHour*ROW_H - 26)+'px';
    label.textContent = `${hourToHHMM(startHour)} – ${hourToHHMM(startHour)}`;
    col.appendChild(label);
    dragState = { col, date: col._date, startHour, curHour: startHour, ghost, label };
    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('mouseup', onDragEnd);
  });
}

function onDragMove(e) {
  if (!dragState) return;
  const rect = dragState.col.getBoundingClientRect();
  dragState.curHour = snapHour(clamp((e.clientY - rect.top) / ROW_H, 0, 24));
  const lo = Math.min(dragState.startHour, dragState.curHour);
  const hi = Math.max(dragState.startHour, dragState.curHour);
  dragState.ghost.style.top = (lo*ROW_H)+'px';
  dragState.ghost.style.height = Math.max(4,(hi-lo)*ROW_H)+'px';
  dragState.label.style.top = (lo*ROW_H - 26)+'px';
  dragState.label.textContent = `${hourToHHMM(lo)} – ${hourToHHMM(hi)}`;
}

function onDragEnd() {
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup', onDragEnd);
  if (!dragState) return;
  let lo = Math.min(dragState.startHour, dragState.curHour);
  let hi = Math.max(dragState.startHour, dragState.curHour);
  if (hi - lo < 0.25) { hi = Math.min(24, lo + 0.5); lo = Math.max(0, hi - 0.5); }
  dragState.ghost.remove();
  dragState.label.remove();
  openCreatePopup(dragState.date, lo, hi);
  dragState = null;
}

// ---------- Popup ----------
function openCreatePopup(date, startHour, endHour) {
  popupMode = 'create';
  popupCtx = { date };
  document.getElementById('popupTitle').textContent = 'Nueva entrada';
  document.getElementById('popupDeleteBtn').style.display = 'none';

  const select = document.getElementById('popupTaskSelect');
  select.innerHTML = '';
  (currentState.tasks || []).forEach(t => {
    const opt = document.createElement('option'); opt.value = t.id; opt.textContent = t.name;
    select.appendChild(opt);
  });
  const newOpt = document.createElement('option'); newOpt.value = '__new__'; newOpt.textContent = '+ Nueva tarea';
  select.appendChild(newOpt);
  select.value = currentState.tasks.length ? currentState.tasks[0].id : '__new__';
  select.style.display = '';
  onPopupTaskChange();

  document.getElementById('popupStart').value = hourToHHMM(startHour);
  document.getElementById('popupEnd').value = hourToHHMM(endHour);

  buildPopupColorPicker();
  showPopup();
}

function openEditPopup(task, entryIndex, entry) {
  popupMode = 'edit';
  popupCtx = { task, entryIndex, date: startOfDay(new Date(entry.start)) };
  document.getElementById('popupTitle').textContent = task.name;
  document.getElementById('popupDeleteBtn').style.display = '';

  document.getElementById('popupTaskSelect').style.display = 'none';
  document.getElementById('popupNewTaskFields').style.display = 'none';

  const s = new Date(entry.start);
  document.getElementById('popupStart').value = `${pad2(s.getHours())}:${pad2(s.getMinutes())}`;
  if (entry.end) {
    const e = new Date(entry.end);
    document.getElementById('popupEnd').value = `${pad2(e.getHours())}:${pad2(e.getMinutes())}`;
  } else {
    document.getElementById('popupEnd').value = '';
  }
  showPopup();
}

function onPopupTaskChange() {
  const isNew = document.getElementById('popupTaskSelect').value === '__new__';
  document.getElementById('popupNewTaskFields').style.display = isNew ? 'flex' : 'none';
  const manualColors = currentState.settings && currentState.settings.colorMode === 'manual';
  document.getElementById('popupColorSection').style.display = manualColors ? '' : 'none';
}

function buildPopupColorPicker() {
  const cp = document.getElementById('popupColorPicker');
  cp.innerHTML = '';
  popupColor = COLORS[0];
  COLORS.forEach((c,i) => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (i===0?' selected':'');
    sw.style.background = c;
    sw.onclick = () => { cp.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected')); sw.classList.add('selected'); popupColor = c; };
    cp.appendChild(sw);
  });
}

function showPopup() {
  document.getElementById('popupBackdrop').style.display = 'block';
  document.getElementById('entryPopup').style.display = 'flex';
}
function closePopup() {
  document.getElementById('popupBackdrop').style.display = 'none';
  document.getElementById('entryPopup').style.display = 'none';
  popupMode = null; popupCtx = null;
}

function savePopup() {
  const startVal = document.getElementById('popupStart').value;
  const endVal = document.getElementById('popupEnd').value;
  if (!startVal) { alert('Indica una hora de inicio'); return; }
  const day = startOfDay(popupCtx.date);
  const startMs = day.getTime() + hhmmToHour(startVal)*3600000;
  const endMs = endVal ? day.getTime() + hhmmToHour(endVal)*3600000 : null;
  if (endMs !== null && endMs <= startMs) { alert('La hora de fin debe ser posterior al inicio'); return; }

  if (popupMode === 'create') {
    const select = document.getElementById('popupTaskSelect');
    const isNew = select.value === '__new__';
    if (isNew) {
      const name = document.getElementById('popupNewTaskName').value.trim();
      if (!name) { alert('Ponle un nombre a la tarea'); return; }
      ipcRenderer.send('action', { type:'add-calendar-entry', payload:{ taskId:null, newTaskName:name, newTaskColor:popupColor, startMs, endMs } });
    } else {
      ipcRenderer.send('action', { type:'add-calendar-entry', payload:{ taskId:select.value, startMs, endMs } });
    }
  } else if (popupMode === 'edit') {
    ipcRenderer.send('action', { type:'edit-entry', payload:{ taskId:popupCtx.task.id, entryIndex:popupCtx.entryIndex, startMs, endMs } });
  }
  closePopup();
}

function deletePopupEntry() {
  if (popupMode !== 'edit') return;
  ipcRenderer.send('action', { type:'delete-entry', payload:{ taskId:popupCtx.task.id, entryIndex:popupCtx.entryIndex } });
  closePopup();
}

// ---------- Week nav ----------
function prevWeek() { viewWeekStart = addDays(viewWeekStart,-7); renderWeek(); renderMiniCal(); }
function nextWeek() { viewWeekStart = addDays(viewWeekStart,7); renderWeek(); renderMiniCal(); }

// ---------- Export ----------
// Al pulsar "Exportar CSV" se abre un popup para elegir QUÉ días exportar; luego
// un diálogo nativo "Guardar como…" (en main.js) para elegir DÓNDE guardarlo.
function exportCSV() { openExportPopup(); }

function openExportPopup() {
  if (!currentState) return;
  const dk = dateKey(startOfDay(selectedDate || today0));
  document.getElementById('exportFrom').value = dk;
  document.getElementById('exportTo').value = dk;
  document.querySelector('input[name="exportRange"][value="all"]').checked = true;
  updateExportHint();
  document.getElementById('exportPopupBackdrop').style.display = 'block';
  document.getElementById('exportPopup').style.display = 'flex';
}
function closeExportPopup() {
  document.getElementById('exportPopupBackdrop').style.display = 'none';
  document.getElementById('exportPopup').style.display = 'none';
}

// Devuelve { fromMs, toMsExcl, label } según la opción elegida, o null si es inválida.
function currentExportRange() {
  const val = document.querySelector('input[name="exportRange"]:checked').value;
  if (val === 'all')  return { fromMs: 0, toMsExcl: Infinity, label: 'todos' };
  if (val === 'week') { const f = startOfDay(viewWeekStart).getTime(); return { fromMs: f, toMsExcl: f + 7*86400000, label: 'semana' }; }
  if (val === 'day')  { const d = startOfDay(selectedDate || today0).getTime(); return { fromMs: d, toMsExcl: d + 86400000, label: 'dia' }; }
  const fromV = document.getElementById('exportFrom').value;
  const toV = document.getElementById('exportTo').value;
  if (!fromV || !toV) return null;
  const fromMs = startOfDay(new Date(fromV + 'T00:00:00')).getTime();
  const toMsExcl = startOfDay(new Date(toV + 'T00:00:00')).getTime() + 86400000;
  if (!(toMsExcl > fromMs)) return null;
  return { fromMs, toMsExcl, label: 'rango' };
}

function updateExportHint() {
  const val = document.querySelector('input[name="exportRange"]:checked').value;
  document.getElementById('exportCustomRow').style.display = val === 'custom' ? 'flex' : 'none';
  const hint = document.getElementById('exportHint');
  const r = currentExportRange();
  if (val === 'all') { hint.textContent = 'Se exportarán todos los días con actividad registrada.'; return; }
  if (!r) { hint.textContent = 'Elige las fechas de inicio y fin.'; return; }
  const fromD = new Date(r.fromMs), toD = new Date(r.toMsExcl - 86400000);
  const f = `${pad2(fromD.getDate())}/${pad2(fromD.getMonth()+1)}/${fromD.getFullYear()}`;
  const t = `${pad2(toD.getDate())}/${pad2(toD.getMonth()+1)}/${toD.getFullYear()}`;
  hint.textContent = f === t ? `Día ${f}.` : `Del ${f} al ${t}.`;
}

function buildCSV(fromMs, toMsExcl) {
  const rows = ['Fecha,Tarea,Segundos,Horas'];
  const map = {};
  currentState.tasks.forEach(task => {
    task.entries.forEach(entry => {
      let cur = startOfDay(new Date(entry.start));
      const end = startOfDay(new Date(entry.end || Date.now()));
      while (cur <= end) {
        const dayStart = cur.getTime(), dayEnd = dayStart + 86400000;
        if (dayStart >= fromMs && dayStart < toMsExcl) {
          const from = Math.max(entry.start, dayStart), to = Math.min(entry.end || Date.now(), dayEnd);
          const secs = Math.max(0, Math.floor((to - from) / 1000));
          if (secs > 0) {
            const key = dateKey(cur) + '|' + task.id;
            map[key] = (map[key] || 0) + secs;
          }
        }
        cur = addDays(cur, 1);
      }
    });
  });
  Object.entries(map).sort().forEach(([key, secs]) => {
    const [day, taskId] = key.split('|');
    const task = currentState.tasks.find(t => t.id === taskId);
    const name = (task ? task.name : taskId).replace(/"/g, '""');
    rows.push(`${day},"${name}",${secs},${(secs/3600).toFixed(2)}`);
  });
  return rows.join('\n');
}

function exportFileName(r) {
  if (r.label === 'todos')  return 'imputa-horas-todos.csv';
  if (r.label === 'semana') return 'imputa-horas-semana.csv';
  if (r.label === 'dia')    return `imputa-horas-${dateKey(new Date(r.fromMs))}.csv`;
  return `imputa-horas-${dateKey(new Date(r.fromMs))}_a_${dateKey(new Date(r.toMsExcl - 86400000))}.csv`;
}

async function confirmExport() {
  if (!currentState) return;
  const r = currentExportRange();
  if (!r) { alert('Indica un rango de fechas válido.'); return; }
  const content = buildCSV(r.fromMs, r.toMsExcl);
  if (content.split('\n').length <= 1) { alert('No hay actividad registrada en el rango elegido.'); return; }
  const btn = document.getElementById('exportConfirmBtn');
  const prev = btn.textContent;
  btn.disabled = true; btn.textContent = 'Guardando…';
  try {
    const res = await ipcRenderer.invoke('export-csv', { content, defaultName: exportFileName(r) });
    if (res && res.ok) { closeExportPopup(); shell.openPath(res.path); }
    else if (!(res && res.canceled)) { alert('No se pudo exportar: ' + ((res && res.error) || 'error desconocido')); }
  } catch (e) {
    alert('No se pudo exportar: ' + (e.message || e));
  }
  btn.disabled = false; btn.textContent = prev;
}

function closeWin() { ipcRenderer.send('action', { type:'close-calendar' }); }

setInterval(() => { if (currentState) renderWeek(); }, 60000);
